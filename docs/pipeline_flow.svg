<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="50%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background bar -->
  <rect x="0" y="80" width="900" height="40" rx="20" fill="url(#bg)" opacity="0.1"/>

  <!-- Stage nodes -->
  <!-- Ingest -->
  <rect x="20" y="20" width="120" height="50" rx="10" fill="#1a365d"/>
  <text x="80" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">1. Ingest</text>
  <text x="80" y="58" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">PyMuPDF</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="45" x2="195" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Extract -->
  <rect x="200" y="20" width="130" height="50" rx="10" fill="#0e7490"/>
  <text x="265" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">2. Extract</text>
  <text x="265" y="58" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="9">DeepSeek V4</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="45" x2="385" y2="45" stroke="#94a3b8" stroke-width="2"/>

  <!-- Compute -->
  <rect x="390" y="20" width="130" height="50" rx="10" fill="#0891b2"/>
  <text x="455" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">3. Compute</text>
  <text x="455" y="58" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="9">Sandbox exec()</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="45" x2="575" y2="45" stroke="#94a3b8" stroke-width="2"/>

  <!-- Validate -->
  <rect x="580" y="20" width="130" height="50" rx="10" fill="#0e7490"/>
  <text x="645" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">4. Validate</text>
  <text x="645" y="58" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="9">6-Rule Check</text>

  <!-- Arrow 4 -->
  <line x1="710" y1="45" x2="765" y2="45" stroke="#94a3b8" stroke-width="2"/>

  <!-- Export -->
  <rect x="770" y="20" width="110" height="50" rx="10" fill="#155e75"/>
  <text x="825" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">5. Export</text>
  <text x="825" y="58" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="9">YAML/JSON</text>

  <!-- I/O descriptions below -->
  <text x="80" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">PDF</text>
  <text x="265" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Claims + Evidence</text>
  <text x="455" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Computed Values</text>
  <text x="645" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Validation Report</text>
  <text x="825" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">ARM Artifact</text>

  <!-- Legend below -->
  <rect x="120" y="150" width="14" height="14" rx="3" fill="#1a365d" opacity="0.8"/>
  <text x="140" y="162" fill="#475569" font-family="sans-serif" font-size="9">PDF Ingestion</text>
  <rect x="260" y="150" width="14" height="14" rx="3" fill="#0e7490" opacity="0.8"/>
  <text x="280" y="162" fill="#475569" font-family="sans-serif" font-size="9">LLM Extraction</text>
  <rect x="400" y="150" width="14" height="14" rx="3" fill="#0891b2" opacity="0.8"/>
  <text x="420" y="162" fill="#475569" font-family="sans-serif" font-size="9">Computation</text>
  <rect x="540" y="150" width="14" height="14" rx="3" fill="#155e75" opacity="0.8"/>
  <text x="560" y="162" fill="#475569" font-family="sans-serif" font-size="9">Validation &amp; Export</text>
</svg>